<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ideaconv – Crear Cuenta</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --brand-red:#C8282A; --brand-red-dk:#A01E20;
      --brand-navy:#1A2340; --brand-navy-lt:#243058;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;background:var(--brand-navy);overflow:hidden;}

    .left-panel{width:55%;position:relative;background:var(--brand-navy);display:flex;flex-direction:column;justify-content:center;padding:60px 64px;overflow:hidden;}
    .left-panel::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(200,40,42,.18) 0%,transparent 70%);top:-120px;left:-120px;pointer-events:none;}
    .left-panel::after{content:'';position:absolute;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(200,40,42,.12) 0%,transparent 70%);bottom:-80px;right:40px;pointer-events:none;}
    .geo-ring{position:absolute;border-radius:50%;border:1px solid rgba(255,255,255,.06);}
    .geo-ring-1{width:420px;height:420px;top:-100px;left:-100px;animation:floatRing1 4s ease-in-out infinite;}
    .geo-ring-2{width:280px;height:280px;bottom:60px;right:80px;animation:floatRing2 5s ease-in-out infinite;animation-delay:-1.5s;}
    .geo-ring-3{width:160px;height:160px;top:50%;left:60%;transform:translate(-50%,-50%);border-color:rgba(200,40,42,.6);border-width:2px;animation:floatRing3 3.5s ease-in-out infinite;}
    @keyframes floatRing1{0%,100%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(60px,80px) rotate(25deg)}66%{transform:translate(-40px,35px) rotate(-18deg)}}
    @keyframes floatRing2{0%,100%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(-70px,-55px) rotate(-30deg)}66%{transform:translate(50px,-25px) rotate(20deg)}}
    @keyframes floatRing3{0%,100%{transform:translate(-50%,-50%) scale(1) rotate(0deg)}50%{transform:translate(-50%,-50%) scale(1.5) rotate(180deg)}}

    .left-content{position:relative;z-index:2;}
    .brand-logo{margin-bottom:48px;}
    .brand-logo .fallback-logo{font-family:'Montserrat',sans-serif;font-weight:800;font-size:28px;color:#fff;letter-spacing:1px;}
    .brand-logo .fallback-logo span{color:var(--brand-red);}
    .left-headline{font-family:'Montserrat',sans-serif;font-weight:800;font-size:38px;line-height:1.15;color:#fff;margin-bottom:16px;}
    .left-headline em{font-style:normal;color:var(--brand-red);}
    .left-sub{font-size:15px;color:rgba(255,255,255,.5);line-height:1.7;max-width:380px;}
    .left-footer{position:absolute;bottom:32px;left:64px;font-size:12px;color:rgba(255,255,255,.25);z-index:2;}

    .right-panel{width:45%;background:#F4F6FA;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 52px;position:relative;overflow-y:auto;}
    .right-panel::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,transparent,var(--brand-red) 30%,var(--brand-red) 70%,transparent);opacity:.4;}

    .register-box{width:100%;max-width:380px;}
    .register-greeting{font-family:'Montserrat',sans-serif;font-weight:800;font-size:24px;color:var(--brand-navy);margin-bottom:6px;}
    .register-greeting span{color:var(--brand-red);}
    .register-sub{font-size:13.5px;color:#6B7A99;margin-bottom:28px;}

    .field-group{margin-bottom:16px;}
    .field-label{font-size:12px;font-weight:600;color:#6B7A99;letter-spacing:.4px;text-transform:uppercase;margin-bottom:7px;display:block;}
    .field-wrap{position:relative;}
    .field-wrap i.prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9AA5BE;font-size:16px;pointer-events:none;}
    .field-wrap input{width:100%;padding:12px 14px 12px 42px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;background:#fff;color:var(--brand-navy);transition:border .2s,box-shadow .2s;outline:none;}
    .field-wrap input:focus{border-color:var(--brand-red);box-shadow:0 0 0 3px rgba(200,40,42,.1);}
    .field-wrap input::placeholder{color:#B0BAD0;}
    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#9AA5BE;font-size:16px;cursor:pointer;padding:0;transition:color .2s;}
    .toggle-pw:hover{color:var(--brand-red);}

    .btn-register{width:100%;padding:14px;background:var(--brand-red);color:#fff;border:none;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:15px;letter-spacing:.5px;cursor:pointer;transition:background .2s,transform .1s,box-shadow .2s;box-shadow:0 4px 16px rgba(200,40,42,.3);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
    .btn-register:hover{background:var(--brand-red-dk);box-shadow:0 6px 22px rgba(200,40,42,.4);transform:translateY(-1px);}

    .error-msg{background:#FDECEA;border:1px solid rgba(200,40,42,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--brand-red);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

    .login-link{text-align:center;margin-top:20px;font-size:13px;color:#6B7A99;}
    .login-link a{color:var(--brand-red);font-weight:600;text-decoration:none;}
    .login-link a:hover{opacity:.7;}

    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#B0BAD0;font-size:12px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#E2E8F0;}

    @media(max-width:768px){
      body{flex-direction:column;overflow:auto;}
      .left-panel{width:100%;padding:40px 28px 36px;min-height:auto;}
      .left-headline{font-size:26px;}
      .left-footer{display:none;}
      .right-panel{width:100%;padding:36px 24px 60px;border-radius:24px 24px 0 0;margin-top:-20px;z-index:2;}
      .right-panel::before{display:none;}
      .register-box{max-width:100%;}
    }
  </style>
</head>
<body>

  <!-- Left panel -->
  <div class="left-panel">
    <div class="geo-ring geo-ring-1"></div>
    <div class="geo-ring geo-ring-2"></div>
    <div class="geo-ring geo-ring-3"></div>
    <div class="left-content">
      <div class="brand-logo">
        <img src="/static/idealogo.png" alt="Ideaconv" style="height:48px;width:auto;filter:brightness(0) invert(1);"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="fallback-logo" style="display:none">Idea<span>conv</span></div>
      </div>
      <div class="left-headline">Crea tu<br><em>cuenta</em><br>de acceso</div>
      <p class="left-sub">Únete al sistema de gestión de inversiones de Ideaconv.</p>
    </div>
    <div class="left-footer">© 2026 Ideaconv S.A. de C.V. — Todos los derechos reservados</div>
  </div>

  <!-- Right panel -->
  <div class="right-panel">
    <div class="register-box">

      <div class="register-greeting">Crear <span>cuenta</span></div>
      <p class="register-sub">Completa los datos para registrarte</p>

      {% if error %}
      <div class="error-msg">
        <i class="bi bi-exclamation-circle-fill"></i>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{% url 'register' %}">
        {% csrf_token %}

        <div class="row" style="gap:0;display:flex;gap:12px;margin-bottom:0;">
          <div style="flex:1;" class="field-group">
            <label class="field-label">Nombre</label>
            <div class="field-wrap">
              <i class="bi bi-person prefix"></i>
              <input type="text" name="first_name" placeholder="Nombre"
                     value="{{ first_name|default:'' }}" autocomplete="given-name">
            </div>
          </div>
          <div style="flex:1;" class="field-group">
            <label class="field-label">Apellido</label>
            <div class="field-wrap">
              <i class="bi bi-person prefix"></i>
              <input type="text" name="last_name" placeholder="Apellido"
                     value="{{ last_name|default:'' }}" autocomplete="family-name">
            </div>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Usuario *</label>
          <div class="field-wrap">
            <i class="bi bi-at prefix"></i>
            <input type="text" name="username" placeholder="Nombre de usuario"
                   value="{{ username|default:'' }}" autocomplete="username" autofocus>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Contraseña *</label>
          <div class="field-wrap">
            <i class="bi bi-lock prefix"></i>
            <input type="password" name="password1" id="pw1" placeholder="Mínimo 6 caracteres"
                   autocomplete="new-password">
            <button type="button" class="toggle-pw" onclick="togglePw('pw1','eye1')">
              <i class="bi bi-eye" id="eye1"></i>
            </button>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Confirmar contraseña *</label>
          <div class="field-wrap">
            <i class="bi bi-lock prefix"></i>
            <input type="password" name="password2" id="pw2" placeholder="Repite la contraseña"
                   autocomplete="new-password">
            <button type="button" class="toggle-pw" onclick="togglePw('pw2','eye2')">
              <i class="bi bi-eye" id="eye2"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-register">
          <i class="bi bi-person-plus-fill"></i> Crear Cuenta
        </button>
      </form>

      <div class="divider">¿ya tienes cuenta?</div>

      <div class="login-link">
        <a href="{% url 'login' %}">Iniciar sesión →</a>
      </div>

    </div>
  </div>

<script>
  function togglePw(fieldId, iconId){
    const f = document.getElementById(fieldId);
    const i = document.getElementById(iconId);
    if(f.type==='password'){ f.type='text'; i.className='bi bi-eye-slash'; }
    else { f.type='password'; i.className='bi bi-eye'; }
  }
</script>
</body>
</html>
